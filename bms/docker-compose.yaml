services:
  redis:
    image: redis:8.2.4-alpine
    command: ["redis-server", "--save", ""]

  placement:
    image: daprio/placement:1.16.0
    command: ["./placement", "--port", "50006"]

  # Simulation entry point (no app, just pub/sub gateway)
  simulation-sidecar:
    image: daprio/daprd:1.16.0
    command: ["./daprd", "--app-id", "simulation", "--resources-path", "/components", "--log-level", "info"]
    volumes:
      - ./redis/components:/components
    ports:
      - "3500:3500"
    depends_on:
      - redis
      - placement

  # Room-scoped subsystems
  lighting:
    build: .
    environment:
      - ROLE=lighting
      - ACTOR_ID=lighting-0
      - ROOM_ID=Room 0
      - BUILDING_SERVICE_URL=http://host.docker.internal:8005
      - DAPR_HTTP_ENDPOINT=http://lighting-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://lighting-sidecar:50001
    depends_on:
      - redis
      - placement
  lighting-sidecar:
    image: daprio/daprd:1.16.0
    command: ["./daprd", "--app-id", "lighting", "--app-port", "3000", "--app-channel-address", "lighting", "--placement-host-address", "placement:50006", "--resources-path", "/components", "--log-level", "info"]
    volumes:
      - ./redis/components:/components
    depends_on:
      - lighting

  hvac:
    build: .
    environment:
      - ROLE=hvac
      - ACTOR_ID=hvac-0
      - ROOM_ID=Room 0
      - BUILDING_SERVICE_URL=http://host.docker.internal:8005
      - DAPR_HTTP_ENDPOINT=http://hvac-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://hvac-sidecar:50001
    depends_on:
      - redis
      - placement
  hvac-sidecar:
    image: daprio/daprd:1.16.0
    command: ["./daprd", "--app-id", "hvac", "--app-port", "3000", "--app-channel-address", "hvac", "--placement-host-address", "placement:50006", "--resources-path", "/components", "--log-level", "info"]
    volumes:
      - ./redis/components:/components
    depends_on:
      - hvac

  shading:
    build: .
    environment:
      - ROLE=shading
      - ACTOR_ID=shading-0
      - ROOM_ID=Room 0
      - BUILDING_SERVICE_URL=http://host.docker.internal:8005
      - DAPR_HTTP_ENDPOINT=http://shading-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://shading-sidecar:50001
    depends_on:
      - redis
      - placement
  shading-sidecar:
